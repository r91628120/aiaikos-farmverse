<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI農業經營大富翁 v1.0</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="wood-sign">
        <div class="badge">🎲 v1.0</div>
        <h1>AI農業經營大富翁</h1>
        <p>從一位青農開始，經營你的智慧農業王國！</p>
      </div>
      <div class="top-stats">
        <div class="stat-card">💰<span>資金</span><strong id="money">1,200,000</strong></div>
        <div class="stat-card">🌾<span>產量</span><strong id="yield">0</strong></div>
        <div class="stat-card">🌱<span>永續</span><strong id="sustain">50</strong></div>
        <div class="stat-card">😊<span>幸福度</span><strong id="happy">80%</strong></div>
        <div class="stat-card round">📅<span>回合</span><strong><span id="round">1</span>/30</strong></div>
      </div>
    </header>

    <main class="layout">
      <aside class="left-panel panel">
        <button id="startBtn" class="main-btn">🚀 開始遊戲</button>
        <button id="rollBtn" class="main-btn primary" disabled>🎲 擲骰子</button>
        <button id="aiBtn" class="main-btn">🤖 AI小幫手</button>
        <button id="resetBtn" class="main-btn ghost">🔄 重新開始</button>

        <section class="player-card">
          <div class="avatar">👨‍🌾</div>
          <h2>阿澤青農</h2>
          <p>Lv.1 智慧農業新手</p>
          <div class="xp-bar"><span id="xpBar"></span></div>
          <small id="xpText">經驗值 0 / 100</small>
        </section>
      </aside>

      <section class="map-wrap panel">
        <div class="map-title">🗺 臺灣農業冒險地圖</div>
        <div id="taiwanMap" class="taiwan-map"></div>
      </section>

      <aside class="right-panel panel">
        <section class="dice-box">
          <div class="dice" id="dice">?</div>
          <p id="diceText">按下開始遊戲</p>
        </section>

        <section class="card-display">
          <h3 id="cardTitle">📜 今日事件</h3>
          <p id="cardDesc">遊戲開始後，走到不同地點會觸發機會卡、命運卡與農業事件。</p>
          <div id="cardEffect" class="effect">等待任務開始</div>
        </section>

        <section class="ai-box">
          <h3>🤖 AI農業經營顧問</h3>
          <p id="aiAdvice">先穩住現金流，再慢慢擴大農場。不要一開始就把錢全部花光喔！</p>
        </section>
      </aside>
    </main>

    <footer class="bottom-bar panel">
      <div class="quick-actions">
        <button>🎒 背包</button>
        <button>🏦 銀行</button>
        <button>🌦 氣象</button>
        <button>🦠 病蟲害</button>
        <button>🚁 無人機</button>
        <button>🏆 成就</button>
      </div>
      <div class="log-box">
        <h3>📒 回合紀錄</h3>
        <ul id="logList"></ul>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
